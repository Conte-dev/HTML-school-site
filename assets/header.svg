
<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.10" stroke="#ffffff" stroke-width="0.3">
    <line x1="0" y1="75" x2="1200" y2="75"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="480" y1="0" x2="480" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="720" y1="0" x2="720" y2="300"/>
    <line x1="840" y1="0" x2="840" y2="300"/>
    <line x1="960" y1="0" x2="960" y2="300"/>
    <line x1="1080" y1="0" x2="1080" y2="300"/>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="70" width="6" height="160" rx="2"
        fill="url(#accent)" filter="url(#glow)"/>

  <!-- Title -->
  <text x="130" y="165"
        fill="#ffffff"
        font-size="58"
        font-family="monospace"
        font-weight="700"
        filter="url(#glow)">
    HTML School Site
  </text>

  <!-- Accent underline -->
  <rect x="130" y="190" width="520" height="3"
        fill="url(#accent)" opacity="0.9"/>

</svg>
